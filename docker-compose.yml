services:
  mongodb:
    image: mongo:6.0
    container_name: monorepo_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  api:
    container_name: monorepo_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://root:secretpassword@mongodb:27017/procureapp?authSource=admin
    depends_on:
      - mongodb
    restart: unless-stopped

  web:
    container_name: monorepo_web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data: