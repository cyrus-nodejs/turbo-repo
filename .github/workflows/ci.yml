name: CI / Container Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out repository source code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Node.js workspace ecosystem
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3. Setup PNPM Package Manager cache for faster runner workflows
    - name: Install PNPM
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Get PNPM Cache Directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup PNPM Cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.exports.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 4. Monorepo code formatting and static verification check
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint Codebase
      run: pnpm lint

    # 5. Container Orchestration & Testing Setup
  

    - name: Build and Start Containers
      run: docker-compose up --build -d

   # 6. Runtime Verification tests with adjusted wait times for MongoDB init
    - name: Verify API Service Health (NestJS)
      run: |
        echo "Waiting for MongoDB and NestJS container engine to initialize..."
        sleep 15
        curl --fail --retry 5 --retry-delay 5 http://localhost:4000/ || exit 1

    - name: Verify Web Frontend Application (Next.js)
      run: |
        curl --fail --retry 3 --retry-delay 5 http://localhost:3000/ || exit 1

    # 7. Safe cleanup environment post run execution
    - name: Teardown Containers
      if: always()
      run: docker-compose down
